<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando...</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
    }
  </style>
</head>

<body class="h-screen flex items-center justify-center text-white">

  <div id="container" class="text-center space-y-6 opacity-0">

    <!-- Loader -->
    <div class="flex justify-center">
      <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Texto -->
    <h1 class="text-2xl font-semibold tracking-wide">
      Preparando sua experiência...
    </h1>

    <p class="text-gray-400 text-sm">
      Você será redirecionado automaticamente
    </p>

    <!-- Botão fallback -->
    <a href="./front-end/index.html"
       class="inline-block mt-4 px-6 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 transition-all duration-300 shadow-lg shadow-blue-600/30">
      Ir agora
    </a>

  </div>

  <script>
    // Animação de entrada
    gsap.to("#container", {
      opacity: 1,
      y: -10,
      duration: 1,
      ease: "power3.out"
    });

    // Delay + redirecionamento suave
    setTimeout(() => {
      gsap.to("#container", {
        opacity: 0,
        y: 20,
        duration: 0.6,
        onComplete: () => {
          window.location.replace("./front-end/index.html");
        }
      });
    }, 2000);
  </script>

</body>
</html>
