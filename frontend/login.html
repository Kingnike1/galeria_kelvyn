<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="./js/config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Kelvyn | Fotógrafo</title>

  <script src="./js/login.js" defer></script>

  <!-- Tailwind CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

  <!-- NAVBAR -->
  <header class="fixed w-full bg-black/60 backdrop-blur-md z-50 top-0">
    <div class="max-w-7xl mx-auto flex justify-between items-center p-5">
      <a href="/" class="text-2xl font-bold tracking-widest hover:text-gray-400 transition">KELVYN</a>
      <nav class="space-x-6 hidden md:block">
        <a href="/" class="hover:text-gray-400 transition">Home</a>
        <a href="/#galeria" class="hover:text-gray-400 transition">Galeria</a>
        <a href="/#contato" class="hover:text-gray-400 transition">Contato</a>
      </nav>
    </div>
  </header>

  <!-- CONTAINER PRINCIPAL -->
  <div class="w-full max-w-md px-6 py-8 mt-16">
    <div class="bg-zinc-900/80 backdrop-blur-md rounded-xl p-8 border border-zinc-800">
      <h2 class="text-3xl font-bold text-center mb-2">Bem-vindo</h2>
      <p class="text-gray-400 text-center mb-8">Faça login ou crie uma conta</p>

      <!-- ABAS -->
      <div class="flex gap-4 mb-8">
        <button id="btnLogin" class="flex-1 py-2 px-4 bg-white text-black font-semibold rounded-lg transition tab-btn active" data-tab="login">
          Login
        </button>
        <button id="btnRegistro" class="flex-1 py-2 px-4 bg-zinc-800 text-white font-semibold rounded-lg hover:bg-zinc-700 transition tab-btn" data-tab="registro">
          Registrar
        </button>
      </div>

      <!-- FORMULÁRIO DE LOGIN -->
      <form id="formLogin" class="tab-content active space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Email</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="seu@email.com"
            class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-white transition"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Senha</label>
          <input
            type="password"
            id="loginSenha"
            placeholder="••••••••"
            class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-white transition"
            required
          />
        </div>

        <button
          type="submit"
          class="w-full py-2 px-4 bg-white text-black font-semibold rounded-lg hover:bg-gray-200 transition duration-300"
        >
          Entrar
        </button>

        <div id="loginError" class="hidden p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm"></div>
      </form>

      <!-- FORMULÁRIO DE REGISTRO -->
      <form id="formRegistro" class="tab-content hidden space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Email</label>
          <input
            type="email"
            id="registroEmail"
            placeholder="seu@email.com"
            class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-white transition"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Senha</label>
          <input
            type="password"
            id="registroSenha"
            placeholder="••••••••"
            class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-white transition"
            required
            minlength="6"
          />
          <p class="text-xs text-gray-400 mt-1">Mínimo de 6 caracteres</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Confirmar Senha</label>
          <input
            type="password"
            id="registroSenhaConfirm"
            placeholder="••••••••"
            class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-white transition"
            required
          />
        </div>

        <button
          type="submit"
          class="w-full py-2 px-4 bg-white text-black font-semibold rounded-lg hover:bg-gray-200 transition duration-300"
        >
          Criar Conta
        </button>

        <div id="registroError" class="hidden p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm"></div>
      </form>
    </div>

    <!-- LINK PARA HOME -->
    <div class="text-center mt-6">
      <a href="/" class="text-gray-400 hover:text-white transition">
        ← Voltar para Home
      </a>
    </div>
  </div>

</body>
</html>
