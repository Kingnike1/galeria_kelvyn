<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="./js/config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload de Fotos - Kelvyn | Fotógrafo</title>

  <!-- Tailwind CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body class="bg-black text-white min-h-screen">

  <!-- NAVBAR -->
  <header class="fixed w-full bg-black/60 backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center p-5">
      <a href="/" class="text-2xl font-bold tracking-widest hover:text-gray-400 transition">KELVYN</a>
      <nav class="space-x-6 hidden md:block">
        <a href="/" class="hover:text-gray-400 transition">Home</a>
        <a href="/#galeria" class="hover:text-gray-400 transition">Galeria</a>
        <a href="/#contato" class="hover:text-gray-400 transition">Contato</a>
      </nav>
    </div>
  </header>

  <!-- CONTAINER PRINCIPAL -->
  <div class="min-h-screen flex items-center justify-center px-4 py-20 pt-32">
    <div class="w-full max-w-md bg-zinc-900/80 backdrop-blur-md rounded-xl p-8 border border-zinc-800">
      <h2 class="text-3xl font-bold text-center mb-2">Upload de Fotos</h2>
      <p class="text-gray-400 text-center mb-8">Compartilhe suas melhores fotos</p>

      <form id="formUpload" class="space-y-6">
        <!-- Campo de Título -->
        <div>
          <label class="block text-sm font-medium mb-2">Título da Foto</label>
          <input
            type="text"
            name="titulo"
            placeholder="Ex: Sunset in Paradise"
            class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-white transition"
            required
          />
        </div>

        <!-- Campo de Arquivo -->
        <div>
          <label class="block text-sm font-medium mb-2">Selecione a Imagem</label>
          <div class="relative">
            <input
              type="file"
              name="image"
              accept="image/*"
              class="hidden"
              id="fileInput"
              required
            />
            <label
              for="fileInput"
              class="block w-full px-4 py-3 bg-zinc-800 border-2 border-dashed border-zinc-700 rounded-lg cursor-pointer hover:border-white transition text-center"
            >
              <i class="bi bi-cloud-upload text-2xl mb-2 block"></i>
              <span id="fileName" class="text-sm">Clique para selecionar ou arraste aqui</span>
            </label>
          </div>
        </div>

        <!-- Botão de Envio -->
        <button
          type="submit"
          class="w-full py-3 px-4 bg-white text-black font-semibold rounded-lg hover:bg-gray-200 transition duration-300 flex items-center justify-center gap-2"
        >
          <i class="bi bi-upload"></i>
          Enviar Foto
        </button>

        <!-- Mensagem de Sucesso -->
        <div id="successMessage" class="hidden p-4 bg-green-900/30 border border-green-700 rounded-lg text-green-300 text-sm">
          <i class="bi bi-check-circle mr-2"></i>
          Foto enviada com sucesso!
        </div>

        <!-- Mensagem de Erro -->
        <div id="errorMessage" class="hidden p-4 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm"></div>
      </form>

      <!-- Link para Home -->
      <div class="text-center mt-6">
        <a href="/" class="text-gray-400 hover:text-white transition">
          ← Voltar para Home
        </a>
      </div>
    </div>
  </div>

  <script src="./js/formulario.js"></script>

  <script>
    // 📁 Mostrar nome do arquivo selecionado
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");

    fileInput.addEventListener("change", (e) => {
      if (e.target.files.length > 0) {
        fileName.textContent = e.target.files[0].name;
      }
    });

    // 🎯 Drag and drop
    const label = document.querySelector("label[for='fileInput']");

    label.addEventListener("dragover", (e) => {
      e.preventDefault();
      label.classList.add("border-white", "bg-zinc-700");
    });

    label.addEventListener("dragleave", () => {
      label.classList.remove("border-white", "bg-zinc-700");
    });

    label.addEventListener("drop", (e) => {
      e.preventDefault();
      label.classList.remove("border-white", "bg-zinc-700");
      fileInput.files = e.dataTransfer.files;
      if (fileInput.files.length > 0) {
        fileName.textContent = fileInput.files[0].name;
      }
    });
  </script>

</body>
</html>
