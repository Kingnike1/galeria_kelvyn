<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="./js/config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Galeria Kelvyn</title>

  <!-- Tailwind CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body class="bg-black text-white">

  <!-- NAVBAR -->
  <header class="fixed w-full bg-black/60 backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center p-5">
      <a href="/" class="text-2xl font-bold tracking-widest hover:text-gray-400 transition">KELVYN</a>
      <nav class="space-x-6 flex items-center">
        <a href="/" class="hover:text-gray-400 transition">Home</a>
        <a href="/formulario" class="hover:text-gray-400 transition">Upload</a>
        <button id="logoutBtn" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition">Sair</button>
      </nav>
    </div>
  </header>

  <!-- DASHBOARD CONTENT -->
  <main class="pt-24 px-4 md:px-6 max-w-7xl mx-auto">
    <h2 class="text-4xl text-center mb-16">Dashboard</h2>

    <!-- STATS -->
    <section id="stats" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16 text-center">
        <div class="bg-zinc-900 p-6 rounded-lg">
            <h3 class="text-3xl font-bold" id="total-fotos">-</h3>
            <p class="text-gray-400">Fotos na Galeria</p>
        </div>
        <div class="bg-zinc-900 p-6 rounded-lg">
            <h3 class="text-3xl font-bold" id="total-usuarios">-</h3>
            <p class="text-gray-400">Usuários Cadastrados</p>
        </div>
    </section>

    <!-- USERS MANAGEMENT -->
    <section id="dashboard-usuarios" class="mb-16">
        <h3 class="text-3xl text-center mb-8">Gerenciamento de Usuários</h3>
        <div class="bg-zinc-900 rounded-lg overflow-x-auto">
            <table class="w-full">
                <thead class="bg-zinc-800 border-b border-zinc-700">
                    <tr>
                        <th class="px-6 py-4 text-left text-sm font-semibold">Email</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold">Nome</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold">Role</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold">Ações</th>
                    </tr>
                </thead>
                <tbody id="usuarios-table">
                    <!-- Linhas de usuários serão inseridas aqui -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- GALLERY -->
    <section id="dashboard-galeria">
        <h3 class="text-3xl text-center mb-8">Galeria Global</h3>
        <div id="galeria-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            <!-- Cards de fotos serão inseridos aqui -->
        </div>
        <div id="loadingMessage" class="text-center text-gray-500 py-10">
            <p>Carregando fotos...</p>
        </div>
    </section>
  </main>

  <script src="./js/auth.js"></script>
  <script src="./js/dashboard.js"></script>
</body>
</html>
